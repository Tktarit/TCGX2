services:
  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - tcgx2_db:/app/db
    environment:
      - DATABASE_URL=sqlite:////app/db/tcgx2.db
      - UPLOAD_DIR=uploads
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/grade-card
    depends_on:
      - n8n

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  n8n_data:
  tcgx2_db:
